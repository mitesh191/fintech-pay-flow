framework:
    cache:
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

        pools:
            rate_limiter_cache:
                adapter: cache.adapter.redis
                provider: '%env(REDIS_URL)%'

when@test:
    framework:
        cache:
            app: cache.adapter.array
            default_redis_provider: 'redis://localhost'
            pools:
                rate_limiter_cache:
                    adapter: cache.adapter.array
                    provider: ~

