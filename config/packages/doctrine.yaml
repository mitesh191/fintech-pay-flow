doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        types:
            uuid: Symfony\Bridge\Doctrine\Types\UuidType
        options:
            # Strict mode: fail fast on any data truncation / type coercion
            !php/const PDO::MYSQL_ATTR_INIT_COMMAND: "SET sql_mode='STRICT_ALL_TABLES,NO_ENGINE_SUBSTITUTION'"
            # Persistent connections: reuse the TCP socket to MySQL across
            # PHP-FPM requests, eliminating 5–20 ms handshake + auth per request.
            !php/const PDO::ATTR_PERSISTENT: true

        # Health-check: reconnect if the connection goes stale under load
        keep_slave: false

    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            system: cache.adapter.system
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
