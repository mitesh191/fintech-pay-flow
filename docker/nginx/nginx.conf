# nginx.conf — overrides the default worker and event settings from the
# nginx:alpine base image for the fund-transfer API.
#
# worker_processes auto    → one worker per vCPU (kernel schedules each on a
#                            separate core; no GIL-style contention).
# worker_connections 4096  → max simultaneous connections PER worker.
#                            With 2 vCPUs: 2 × 4096 = 8192 total upstream
#                            connections — well above the FPM pool ceiling.
# multi_accept on          → each worker accepts all pending connections on
#                            its turn through the epoll loop rather than one
#                            at a time. Reduces accept() syscall overhead under burst.
# use epoll                → Linux kernel event notification (O(1) vs select's O(n)).

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Structured access log — easier to parse in Grafana / ELK than plain text.
    log_format  json_combined  escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"request_id":"$http_x_request_id"}';

    access_log  /var/log/nginx/access.log  json_combined;

    sendfile       on;
    tcp_nopush     on;   # batch headers + first data chunk (sendfile + tcp_nopush)
    tcp_nodelay    on;   # disable Nagle after connection upgrade / keep-alive

    # HTTP keep-alive: allow up to 1000 pipelined requests before closing.
    # The API is stateless; high limits reduce TCP handshake overhead for
    # clients that issue many sequential calls (e.g., batch reconciliation jobs).
    keepalive_timeout   65;
    keepalive_requests  1000;

    # Downstream (client-facing) timeouts.
    # client_body_timeout: how long nginx waits between body chunks.
    # send_timeout: how long nginx waits for the client to accept a response chunk.
    client_body_timeout  10s;
    send_timeout         10s;

    # Do not reveal nginx version in Server header or error pages.
    server_tokens  off;

    # Compression: OFF for this API.
    # JSON responses from a financial API are small (< 1 KB typical).
    # gzip adds CPU cost and latency headroom that outweighs the bandwidth saving.
    gzip  off;

    # PHP upstream connection pool — kept alive between requests so FPM workers
    # are reused without a new TCP handshake for every request.
    upstream php_fpm {
        server app:9000;
        keepalive 64;   # idle keep-alive connections held in nginx's pool
    }

    include /etc/nginx/conf.d/*.conf;
}
