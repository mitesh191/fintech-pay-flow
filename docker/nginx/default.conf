server {
    listen 80;

    root /var/www/public;
    index index.php;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                                always;
    add_header X-Frame-Options           "DENY"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"    always;
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;
    # Never expose which server software is running
    server_tokens off;

    # ── Performance ───────────────────────────────────────────────────────────
    # The upstream block and keepalive pool are defined in nginx.conf so they
    # are shared across all server blocks, not re-created per vhost.

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Must exceed PHP max_execution_time (30 s) plus BCMath headroom.
        fastcgi_read_timeout 35s;
        fastcgi_send_timeout 10s;
        fastcgi_connect_timeout 5s;

        # Buffer FastCGI responses in nginx memory before sending to the client.
        # Frees PHP-FPM worker slots faster under slow-consumer clients.
        fastcgi_buffering      on;
        fastcgi_buffer_size    16k;
        fastcgi_buffers        8 16k;
        fastcgi_busy_buffers_size 32k;

        # HTTP/1.1 is required to enable upstream keep-alive connections
        # (HTTP/1.0 forces a new connection on every request).
        fastcgi_keep_conn on;
    }
}