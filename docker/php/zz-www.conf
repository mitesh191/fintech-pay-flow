; PHP-FPM pool tuning for the fund-transfer API.
;
; This file uses the zz- prefix so it loads LAST and overrides the defaults
; in the base image's www.conf without deleting that file.
;
; Sizing guidance (per pod / container):
;   pm.max_children  = (available RAM - system overhead) / average worker RSS
;   A typical Symfony API worker under load uses ~32–48 MB.
;   With 512 MB container: (512 - 64) / 40 ≈ 50. Tune per your actual metrics.
;
; For a multi-pod deployment behind a load balancer, multiply pm.max_children
; by the number of replicas to get the effective concurrency capacity.

[www]
; Dynamic pool: FPM scales workers between min and max based on demand.
; This is the right choice when request rates vary (e.g., peak vs off-hours).
pm = dynamic

; Hard ceiling on concurrent workers. Each worker consumes ~32–48 MB RSS.
; Set this to (container_memory_mb - 64) / 40 and tune from real metrics.
pm.max_children = 50

; Workers pre-forked at startup — avoids cold-start latency on the first burst.
pm.start_servers = 10

; Keep at least this many idle workers to absorb traffic spikes without
; needing to fork new processes (fork is expensive under InnoDB write load).
pm.min_spare_servers = 5

; Kill idle workers above this count to reclaim RAM during quiet periods.
pm.max_spare_servers = 20

; Recycle workers after this many requests to prevent gradual memory leaks.
; Doctrine's EntityManager and the Predis client can accumulate state.
pm.max_requests = 500

; Log slow requests so you can identify N+1 query regressions in production.
; Any request taking longer than this many seconds is logged.
request_slowlog_timeout = 3s
slowlog = /var/log/php-fpm-slow.log

; Hard-kill a worker that has been running longer than max_execution_time.
; Must be >= PHP max_execution_time to avoid killing legitimately slow transfers.
request_terminate_timeout = 35s

; Listen address — must match nginx fastcgi_pass target.
listen = 0.0.0.0:9000
