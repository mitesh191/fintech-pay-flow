; Security & Performance Settings
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
expose_php = Off

; Limits
max_execution_time = 30
memory_limit = 256M
post_max_size = 10M
upload_max_filesize = 10M

; Date
date.timezone = UTC

; Filesystem cache — eliminates redundant stat() calls on every request.
; Symfony's autoloader resolves hundreds of paths per request; without this
; each is a syscall. 4 MB covers a typical Symfony vendor tree comfortably.
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; OPcache preload (prod only) — warm the opcode cache at FPM start so the
; first real requests do not pay compilation cost. The preload.php file is
; generated by `bin/console cache:warmup --env=prod`.
opcache.preload = /var/www/config/preload.php
opcache.preload_user = www-data
