# Redis configuration for fund-transfer-api
maxmemory 256mb
# noeviction: Redis rejects new writes when memory is full rather than silently
# evicting keys.  For a financial system this is the only safe policy — evicting
# an in-flight idempotency lock would allow two concurrent requests to both enter
# the critical section and produce a duplicate transfer.
# Ops alert: monitor redis_used_memory and increase maxmemory before this triggers.
maxmemory-policy noeviction

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Redis configuration for fund-transfer-api

# Bind to all interfaces so other containers in the Docker network can reach Redis.
# In a Docker environment network isolation is enforced by Docker itself; the OS-level
# protected-mode guard is redundant and prevents inter-container connectivity.
bind 0.0.0.0

# Security
# protected-mode yes requires either a password (requirepass) or a loopback bind.
# Neither applies here — Docker handles network isolation at the compose network level.
protected-mode no

# Performance
tcp-keepalive 300
timeout 0
# Note: tcp-nodelay is a socket option applied by Redis automatically on accepted
# connections; it is not a redis.conf file directive and cannot be set here.
